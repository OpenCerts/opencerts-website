name: CI - Lint and Test

on:
  push:
    branches: [develop, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --if-present

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --ci

      - name: Build and run integration
        env:
          # Public default Infura keys used for CI.
          INFURA_API_KEY_PROVIDER: "84842078b09946638c03157f83405213"
          INFURA_API_KEY_RESOLVER: "84842078b09946638c03157f83405213"
        run: ./scripts/integration-headless.sh
